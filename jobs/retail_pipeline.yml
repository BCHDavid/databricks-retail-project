bundle:
  name: retail_project

targets:
  dev:
    workspace:
      host: https://dbc-fde52c50-f44d.cloud.databricks.com

resources:
  jobs:
    retail_pipeline:
      name: retail_pipeline_job

      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: src/bronze_ingestion

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: src/silver_transformation

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: src/gold_aggregations
